index_paths:
  - "."
exclude_patterns:
  - node_modules
  - __pycache__
  - .git
  - .rag/index
  - .rag/chunks
  - dist
  - build
  - .venv
  - venv
  - "*.pyc"
  - "*.min.js"
  - "*.map"
  - package-lock.json
  - yarn.lock
  - poetry.lock
chunk_strategy: semantic
chunk_size_tokens: 400
chunk_overlap_tokens: 0
embedding_model: all-MiniLM-L6-v2
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
context_budget_tokens: 40000
retrieval_top_k: 20
rerank_top_k: 5
inject_top_k: 3
min_similarity: 0.25
session_type: short
watch_mode: false
reranking_enabled: true
